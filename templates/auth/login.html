{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
    
    <!-- Dev Helper -->
    <div style="background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); padding: 1rem; border-radius: 12px; margin-bottom: 2rem; font-size: 0.8rem; text-align: center;">
        <p style="margin: 0; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Credentials (DEV ONLY)</p>
        <p style="margin: 0.25rem 0 0; color: var(--text-secondary);">Email: <span style="color: white; font-weight: 600;">admin@jetpulse.com</span></p>
        <p style="margin: 0; color: var(--text-secondary);">Password: <span style="color: white; font-weight: 600;">admin123</span></p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Log In</button>
        <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 500;">Register Here</a>
        </p>
    </form>
</div>
{% endblock %}
