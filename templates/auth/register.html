{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Join JetPulse</h2>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
            <label>Register As</label>
            <select name="role">
                <option value="passenger">Passenger</option>
                <option value="staff">Crew Member / Staff</option>
                <option value="admin">Administrator (Only for Review)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">Create Account</button>
        <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 500;">Login Here</a>
        </p>
    </form>
</div>
{% endblock %}
