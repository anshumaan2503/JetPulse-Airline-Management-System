{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Register New Aircraft</h2>
    <form method="POST">
        <div class="form-group">
            <label>Aircraft Model</label>
            <input type="text" name="model" placeholder="Boeing 747" required>
        </div>
        <div class="form-group">
            <label>Registration Number</label>
            <input type="text" name="registration_number" placeholder="N1234PW" required>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
            <label>Seat Capacity</label>
            <input type="number" name="capacity" placeholder="Total Seats" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Add Aircraft to Fleet</button>
    </form>
</div>
{% endblock %}
