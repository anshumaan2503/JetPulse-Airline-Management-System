{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Assign Crew to Flight</h2>
    <form action="{{ url_for('admin.assign_crew') }}" method="POST">
        <div class="form-group">
            <label>Select Flight</label>
            <select name="flight_id" required>
                {% for flight in flights %}
                <option value="{{ flight.id }}">{{ flight.flight_number }} ({{ flight.source }} to {{ flight.destination }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Select Staff Member</label>
            <select name="user_id" required>
                {% for staff in staff_members %}
                <option value="{{ staff.id }}">{{ staff.username }} ({{ staff.email }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" required>
                <option value="Pilot">Pilot</option>
                <option value="Co-Pilot">Co-Pilot</option>
                <option value="Cabin Crew">Cabin Crew</option>
                <option value="Flight Attendant">Flight Attendant</option>
                <option value="Ground Staff">Ground Staff</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Assign Crew</button>
    </form>
</div>
{% endblock %}
