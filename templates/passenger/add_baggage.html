{% extends "base.html" %}

{% block content %}
<div class="form-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Register Baggage</h2>
    <div style="background: rgba(255, 255, 255, 0.03); padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem;">
        <p style="margin: 0; font-size: 0.8rem; color: var(--text-secondary);">Booking Reference</p>
        <p style="margin: 0; font-weight: 700; color: var(--secondary);">{{ booking.booking_reference }}</p>
        <p style="margin: 0.5rem 0 0; font-size: 0.8rem; color: var(--text-secondary);">Flight</p>
        <p style="margin: 0; font-weight: 700;">{{ booking.flight.flight_number }} | {{ booking.flight.source }} to {{ booking.flight.destination }}</p>
    </div>
    
    <form action="{{ url_for('passenger.add_baggage', booking_id=booking.id) }}" method="POST">
        <div class="form-group">
            <label>Baggage Weight (kg)</label>
            <input type="number" step="0.1" name="weight" placeholder="e.g. 23.5" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Baggage</button>
    </form>
</div>
{% endblock %}
